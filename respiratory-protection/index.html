g-cartridge-you-re-spraying-an-emulsion-b", "audio": "audio/scenario-1-the-wrong-cartridge-you-re-spraying-an-emulsion-b.mp3"}, {"kind": "scenario", "section_idx": 9, "section_title": "Four real Refresh scenarios", "scenario": {"title": "Scenario 2 \u2014 The seal check fails", "situation": "You put on your half-face APR and do a negative-pressure seal check. The facepiece doesn't hold \u2014 you feel air leaking near your cheek. You've got a fit-test card from eight months ago.", "question": "Do you start the task?", "answer_headline": "No. A passing fit test last year doesn't override a failed seal check today.", "bullets": ["Reseat the mask and adjust the straps, then re-do the seal check", "Check for stubble on the seal line, a worn facepiece, or a misseated cartridge", "If it still won't seal, take it out of service and get one that does (OHSR s. 8.41)", "Never 'work through' a leak \u2014 a leaking APR is the same as no respirator"]}, "audio_text": "Scenario 2 \u2014 The seal check fails. You put on your half-face APR and do a negative-pressure seal check. The facepiece doesn't hold \u2014 you feel air leaking near your cheek. You've got a fit-test card from eight months ago. Do you start the task? The right answer: No. A passing fit test last year doesn't override a failed seal check today.", "id": "scenario-2-the-seal-check-fails-you-put-on-your-half-face-ap", "audio": "audio/scenario-2-the-seal-check-fails-you-put-on-your-half-face-ap.mp3"}, {"kind": "scenario", "section_idx": 9, "section_title": "Four real Refresh scenarios", "scenario": {"title": "Scenario 3 \u2014 The beard / fit issue", "situation": "A co-worker shows up for a chemical-transfer task with a few days of beard growth along the jaw. He says he'll just cinch the straps down hard and it'll be fine for a quick job.", "question": "Is that acceptable?", "answer_headline": "No. Clean shaven where it seals \u2014 every time, even for quick jobs.", "bullets": ["Facial hair on the seal line breaks the seal; tighter straps don't close the gap", "OHSR s. 8.39 and the Refresh SMS require clean-shaven skin where the respirator seals", "He shaves the seal area, or he doesn't do the task that needs the respirator", "If clean-shaving isn't possible, a loose-fitting powered (PAPR) or supplied-air option must be selected instead \u2014 not a tight-fitting mask"]}, "audio_text": "Scenario 3 \u2014 The beard / fit issue. A co-worker shows up for a chemical-transfer task with a few days of beard growth along the jaw. He says he'll just cinch the straps down hard and it'll be fine for a quick job. Is that acceptable? The right answer: No. Clean shaven where it seals \u2014 every time, even for quick jobs.", "id": "scenario-3-the-beard-fit-issue-a-co-worker-shows-up-for-a-ch", "audio": "audio/scenario-3-the-beard-fit-issue-a-co-worker-shows-up-for-a-ch.mp3"}, {"kind": "scenario", "section_idx": 9, "section_title": "Four real Refresh scenarios", "scenario": {"title": "Scenario 4 \u2014 H\u2082S alarm: reach for the cartridge mask?", "situation": "Your personal H\u2082S monitor alarms at a wellsite. A worker is down near a leaking line. Your truck has a half-face APR with fresh organic-vapour cartridges. SCBA is in the rental case.", "question": "Do you put on the APR and go pull him out?", "answer_headline": "No. High H\u2082S is IDLH \u2014 an APR cannot protect you. SCBA only.", "bullets": ["An APR cleans air; it cannot make air or keep up with lethal H\u2082S \u2014 you'd go down too", "OHSR s. 8.35 requires full-facepiece positive-pressure SCBA (or airline with an escape cylinder) in IDLH air", "Refresh SMS: do not attempt rescue in suspected H\u2082S without SCBA, and no SCBA work without training", "Move upwind/uphill, call for help, and only trained, SCBA-equipped responders enter"]}, "audio_text": "Scenario 4 \u2014 H\u2082S alarm: reach for the cartridge mask?. Your personal H\u2082S monitor alarms at a wellsite. A worker is down near a leaking line. Your truck has a half-face APR with fresh organic-vapour cartridges. SCBA is in the rental case. Do you put on the APR and go pull him out? The right answer: No. High H\u2082S is IDLH \u2014 an APR cannot protect you. SCBA only.", "id": "scenario-4-h-s-alarm-reach-for-the-cartridge-mask-your-perso", "audio": "audio/scenario-4-h-s-alarm-reach-for-the-cartridge-mask-your-perso.mp3"}];  // expanded list of slides — one entry per visible slide

let state = { screen: 'intro', slideIdx: 0, learnerName: '', employer: '', midAnswers: {}, quizAnswers: {}, quizSubmitted: false, score: 0, passed: false };

function svg(path, color) { return '<svg viewBox="0 0 24 24" fill="none" stroke="' + (color || 'currentColor') + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + path + '</svg>'; }
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  state.screen = name;
  // Pause any playing audio when changing screens
  const aud = document.getElementById('slide-audio');
  if (aud) { aud.pause(); aud.currentTime = 0; }
}

function renderIntroMeta() {
  document.getElementById('brand-eyebrow').textContent = BRAND.tagline || (BRAND.client_name + ' E-LEARNING');
  document.getElementById('module-code').textContent = (CONTENT.meta.code || '') + (CONTENT.meta.version ? ' · ' + CONTENT.meta.version : '');
  document.getElementById('intro-topic').textContent = CONTENT.meta.topic || 'Training';
  document.getElementById('intro-subtitle').textContent = CONTENT.meta.subtitle || '';
  document.getElementById('topbar-topic').textContent = CONTENT.meta.topic || 'Training';
  document.getElementById('quiz-topic').textContent = CONTENT.meta.topic || 'Training';
  document.getElementById('r-module').textContent = (CONTENT.meta.code || '') + (CONTENT.meta.version ? ' ' + CONTENT.meta.version : '');
  document.getElementById('result-footer').textContent = CONTENT.meta.regulation_alignment ? 'Aligned with ' + CONTENT.meta.regulation_alignment : '';

  const pills = [
    { icon: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', label: 'Duration', value: CONTENT.meta.duration || '~30 min' },
    { icon: '<circle cx="12" cy="8" r="6"/><path d="M9 14l-2 8 5-3 5 3-2-8"/>', label: 'Pass mark', value: (CONTENT.meta.pass_mark_pct || 70) + '%' },
    { icon: '<path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>', label: 'Slides', value: SLIDES.length },
    { icon: '<path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14"/>', label: 'Audio', value: SLIDES.some(s => s.audio) ? 'Voiceover' : 'Read-only' }
  ];
  document.getElementById('meta-grid').innerHTML = pills.map(p => '<div class="meta-pill"><div class="icon">' + svg(p.icon) + '</div><div><div class="label">' + escapeHtml(p.label) + '</div><div class="value">' + escapeHtml(p.value) + '</div></div></div>').join('');

  document.getElementById('learning-objectives').innerHTML = (CONTENT.meta.what_you_will_learn || []).map(o => '<li>' + escapeHtml(o) + '</li>').join('');
  document.getElementById('footer-tracking-note').textContent = trackingEnabled() ? 'Your completion will be recorded with ' + BRAND.client_short + '.' : 'Print or save your certificate when you finish.';
}

function renderSlide() {
  const slide = SLIDES[state.slideIdx];
  if (!slide) return;
  const total = SLIDES.length, progress = ((state.slideIdx + 1) / (total + 1)) * 100;

  document.getElementById('slide-counter').textContent = slide.section_title || '';
  document.getElementById('progress-pct').textContent = (state.slideIdx + 1) + ' / ' + total;
  document.getElementById('progress-fill').style.width = progress + '%';

  let html = '';
  const slideKind = slide.kind;
  if (slideKind === 'section_intro') html = renderSectionIntro(slide);
  else if (slideKind === 'block') html = renderBlockSlide(slide);
  else if (slideKind === 'video') html = renderVideoSlide(slide);
  else if (slideKind === 'pictograms') html = renderPictogramsSlide(slide);
  else if (slideKind === 'chemcard') html = renderChemCardSlide(slide);
  else if (slideKind === 'scenario') html = renderScenarioSlide(slide);
  else if (slideKind === 'midcheck_q') html = renderMidCheckQSlide(slide);

  document.getElementById('slide-body').innerHTML = html;
  attachMidCheckHandlers();

  // Audio — autoplay each slide's narration. Browsers permit this after the learner's
  // first interaction (Begin / Continue clicks); if blocked, the visible Play control still works.
  const audioEl = document.getElementById('slide-audio');
  const audioContainer = document.getElementById('audio-container');
  if (slide.audio) {
    audioEl.src = slide.audio;
    audioContainer.classList.remove('empty');
    audioEl.currentTime = 0;
    const _p = audioEl.play();
    if (_p && _p.catch) _p.catch(() => {});
  } else {
    audioEl.removeAttribute('src');
    audioContainer.classList.add('empty');
  }

  // Nav
  document.getElementById('btn-prev').disabled = state.slideIdx === 0;
  const isLast = state.slideIdx === total - 1;
  document.getElementById('btn-next').innerHTML = (isLast ? 'Final quiz' : 'Continue') + ' <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

  // Scroll the slide content area to top
  const sc = document.querySelector('#screen-learn .slide-content');
  if (sc) sc.scrollTop = 0;
}

function renderSectionIntro(slide) {
  const ac = ACCENTS[slide.accent] || ACCENTS.blue;
  return '<div class="section-intro"><div class="icon-big" style="background:' + ac + '">' + svg(ICONS[slide.icon] || ICONS.book, '#fff') + '</div>' +
    '<div class="eyebrow-text" style="color:' + ac + '">' + escapeHtml(slide.eyebrow || '') + '</div>' +
    '<h2>' + escapeHtml(slide.title) + '</h2>' +
    (slide.subtitle ? '<p class="subtitle">' + escapeHtml(slide.subtitle) + '</p>' : '') + '</div>';
}

function renderBlockSlide(slide) {
  const ac = ACCENTS[slide.accent] || ACCENTS.blue;
  return '<div class="block-card">' +
    (slide.eyebrow ? '<div class="block-eyebrow" style="color:' + ac + '">' + escapeHtml(slide.eyebrow) + '</div>' : '') +
    '<h3 class="block-heading"><span class="block-accent" style="background:' + ac + '"></span>' + escapeHtml(slide.heading) + '</h3>' +
    (slide.body ? '<p class="block-body">' + escapeHtml(slide.body) + '</p>' : '') +
    (slide.bullets ? '<ul class="block-bullets">' + slide.bullets.map(bl => '<li><svg viewBox="0 0 24 24" style="color:' + ac + '"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg><span>' + escapeHtml(bl) + '</span></li>').join('') + '</ul>' : '') + '</div>';
}

function renderVideoSlide(slide) {
  const url = slide.video_url || '#';
  return '<div class="video-card"><div class="video-thumb"><div class="video-play-btn" onclick="window.open(' + JSON.stringify(url) + ', \'_blank\', \'noopener\')"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><h3>' + escapeHtml(slide.video_title || '') + '</h3><p>' + escapeHtml(slide.video_source || '') + ' · ' + escapeHtml(slide.video_duration || '') + '</p></div><div class="video-action"><div class="video-action-info"><strong>Click to watch</strong><span>Opens in a new tab</span></div><a href="' + escapeHtml(url) + '" target="_blank" rel="noopener" class="btn-yt">Watch on YouTube <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg></a></div></div>';
}

function renderPictogramsSlide(slide) {
  const ac = ACCENTS[slide.accent] || ACCENTS.blue;
  return '<div class="block-card">' +
    '<h3 class="block-heading"><span class="block-accent" style="background:' + ac + '"></span>' + escapeHtml(slide.heading || 'Pictograms') + '</h3>' +
    (slide.intro ? '<p class="block-body">' + escapeHtml(slide.intro) + '</p>' : '') +
    '<div class="picto-grid">' + slide.items.map(p => '<div class="picto-cell"><img src="' + (p.image_data || p.image || '') + '" alt="' + escapeHtml(p.label) + '"><div class="picto-label">' + escapeHtml(p.label) + '</div><div class="picto-sub">' + escapeHtml(p.sub || '') + '</div></div>').join('') + '</div></div>';
}

function renderChemCardSlide(slide) {
  const c = slide.card;
  const sigColor = c.signal === 'DANGER' ? ACCENTS.red : ACCENTS.amber;
  const rowColors = { 'EXPOSURE LIMITS': ACCENTS.amber, 'PPE': ACCENTS.blue, 'FIRST AID': ACCENTS.green, 'SPILL': ACCENTS.purple, 'STORAGE': ACCENTS.darkblue };
  return '<div class="chem-card"><div class="chem-card-header"><div class="chem-pictos-row">' +
    (c.pictogram_data || []).map(p => '<img src="' + p + '" alt="">').join('') +
    '<span class="signal-badge" style="background:' + sigColor + '">' + escapeHtml(c.signal || '') + '</span></div>' +
    '<div class="chem-card-name">' + escapeHtml(c.name) + '</div><div class="chem-card-full">' + escapeHtml(c.full_name || '') + (c.supplier ? ' · ' + escapeHtml(c.supplier) : '') + '</div>' +
    '<div class="chem-haz">' + escapeHtml(c.hazard_summary || '') + '</div></div>' +
    (c.rows || []).map(row => {
      const rc = rowColors[row.label] || ACCENTS.blue;
      return '<div class="chem-row"><div class="chem-row-label" style="background:' + rc + '">' + escapeHtml(row.label) + '</div><div class="chem-row-items"><ul>' +
        row.items.map(it => '<li><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:' + rc + ';margin-top:7px;margin-right:6px;flex-shrink:0;"></span>' + escapeHtml(it) + '</li>').join('') + '</ul></div></div>';
    }).join('') + '</div>';
}

function renderScenarioSlide(slide) {
  const sc = slide.scenario;
  return '<div class="scenario"><div class="scenario-title">' + escapeHtml(sc.title) + '</div><div class="scenario-grid">' +
    '<div class="scenario-side scenario-situation"><div class="scenario-eyebrow" style="color:' + ACCENTS.blue + '"><svg viewBox="0 0 24 24" style="color:' + ACCENTS.blue + '"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Situation</div><p class="scenario-text">' + escapeHtml(sc.situation) + '</p><p class="scenario-question">' + escapeHtml(sc.question) + '</p></div>' +
    '<div class="scenario-side scenario-answer"><div class="scenario-eyebrow" style="color:' + ACCENTS.green + '"><svg viewBox="0 0 24 24" style="color:' + ACCENTS.green + '"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>Right answer</div><p class="scenario-headline">' + escapeHtml(sc.answer_headline) + '</p><ul class="scenario-bullets">' + (sc.bullets || []).map(b => '<li>' + escapeHtml(b) + '</li>').join('') + '</ul></div></div></div>';
}

function renderMidCheckQSlide(slide) {
  const q = slide.q, key = slide.key;
  const ans = state.midAnswers[key], answered = ans !== undefined;
  return '<div class="kc-banner"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p><strong>Quick check.</strong> You\'ll see the answer right away — won\'t count against your final quiz.</p></div>' +
    '<div class="q-card"><div class="q-text">' + escapeHtml(q.q) + '</div><div class="q-options">' +
    q.options.map((opt, oi) => {
      let cls = 'q-option';
      if (answered) { if (oi === q.correct) cls += ' correct'; else if (ans === oi) cls += ' incorrect'; }
      const checkSvg = answered && oi === q.correct ? '<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>' : '';
      return '<button class="' + cls + '" data-mid="' + key + '" data-opt="' + oi + '" ' + (answered ? 'disabled' : '') + '><span>' + escapeHtml(opt) + '</span>' + checkSvg + '</button>';
    }).join('') + '</div>' +
    (answered ? '<div class="feedback ' + (ans === q.correct ? 'right' : 'wrong') + '"><strong>' + (ans === q.correct ? '✓ Correct.' : '✗ Not quite.') + '</strong> ' + escapeHtml(q.why) + '</div>' : '') + '</div>';
}

function attachMidCheckHandlers() {
  document.querySelectorAll('[data-mid]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.mid, opt = parseInt(btn.dataset.opt);
      if (state.midAnswers[key] !== undefined) return;
      state.midAnswers[key] = opt;
      renderSlide();
    });
  });
}

function renderQuiz() {
  const quiz = CONTENT.quiz || [];
  const passN = Math.ceil(quiz.length * (CONTENT.meta.pass_mark_pct || 70) / 100);
  document.getElementById('quiz-instructions').textContent = quiz.length + ' questions. ' + (CONTENT.meta.pass_mark_pct || 70) + '% to pass (' + passN + '/' + quiz.length + ').';
  document.getElementById('quiz-questions').innerHTML = quiz.map((q, i) => {
    return '<div class="quiz-q"><div><span style="font-size:11px;font-weight:700;color:var(--brand-primary);">Q' + (i + 1) + '.</span> <span style="font-weight:600;">' + escapeHtml(q.q) + '</span></div><div class="q-options" style="margin-top:14px;">' +
      q.options.map((opt, j) => {
        let cls = 'q-option';
        if (state.quizSubmitted) { if (j === q.correct) cls += ' correct'; else if (state.quizAnswers[i] === j) cls += ' incorrect'; }
        else if (state.quizAnswers[i] === j) cls += ' selected';
        return '<button class="' + cls + '" data-q="' + i + '" data-opt="' + j + '" ' + (state.quizSubmitted ? 'disabled' : '') + '><span class="letter">' + String.fromCharCode(65 + j) + '.</span><span style="flex:1;">' + escapeHtml(opt) + '</span></button>';
      }).join('') + '</div>' +
      (state.quizSubmitted && q.why ? '<div class="feedback ' + (state.quizAnswers[i] === q.correct ? 'right' : 'wrong') + '" style="margin-top:12px;"><strong>' + (state.quizAnswers[i] === q.correct ? '✓ Correct.' : '✗ Not quite.') + '</strong> ' + escapeHtml(q.why) + '</div>' : '') + '</div>';
  }).join('');
  document.querySelectorAll('#quiz-questions [data-q]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.quizSubmitted) return;
      state.quizAnswers[parseInt(btn.dataset.q)] = parseInt(btn.dataset.opt);
      renderQuiz();
      checkQuizComplete();
    });
  });
  checkQuizComplete();
}

function checkQuizComplete() {
  const all = (CONTENT.quiz || []).every((_, i) => state.quizAnswers[i] !== undefined);
  document.getElementById('btn-submit-quiz').disabled = !all;
}

function submitQuiz() {
  const quiz = CONTENT.quiz || [];
  const passN = Math.ceil(quiz.length * (CONTENT.meta.pass_mark_pct || 70) / 100);
  let s = 0;
  quiz.forEach((q, i) => { if (state.quizAnswers[i] === q.correct) s++; });
  state.score = s; state.passed = s >= passN; state.quizSubmitted = true;
  renderResult(); showScreen('result');
  if (trackingEnabled()) sendCompletion();
}

function renderResult() {
  const passed = state.passed, quiz = CONTENT.quiz || [];
  const passN = Math.ceil(quiz.length * (CONTENT.meta.pass_mark_pct || 70) / 100);
  const pct = Math.round((state.score / quiz.length) * 100);
  document.querySelector('#screen-result .result-bg').className = 'result-bg ' + (passed ? 'passed' : 'failed');
  document.getElementById('result-icon').className = 'result-icon ' + (passed ? 'pass' : 'fail');
  document.getElementById('result-icon').innerHTML = passed ? svg(ICONS.award) : svg('<path d="M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 005.64 5.64L1 10M3.51 15A9 9 0 0018.36 18.36L23 14"/>');
  document.getElementById('result-title').textContent = passed ? 'Module complete' : 'Not quite there';
  document.getElementById('result-subtitle').textContent = passed ? 'You have successfully completed this training module.' : 'You need ' + passN + ' out of ' + quiz.length + ' correct to pass. Review and try again.';
  document.getElementById('r-name').textContent = state.learnerName;
  document.getElementById('r-employer').textContent = state.employer;
  document.getElementById('r-score').textContent = state.score + ' / ' + quiz.length + ' (' + pct + '%)';
  const rResult = document.getElementById('r-result');
  rResult.textContent = passed ? 'PASSED' : 'FAILED';
  rResult.style.color = passed ? ACCENTS.green : ACCENTS.amber;
  document.getElementById('r-date').textContent = new Date().toLocaleString('en-CA');
  document.getElementById('btn-retry').style.display = passed ? 'none' : 'inline-flex';
}

function setTrackingStatus(status, msg) {
  const el = document.getElementById('tracking-status');
  el.className = 'tracking-status ' + status; el.textContent = msg;
}
// Tracking is "enabled" only when real config is present — placeholders (containing "__")
// leave it disabled so the module still works and just shows the print-certificate note.
function trackingEnabled() {
  const t = CONTENT.tracking || {};
  if (t.provider === 'supabase') {
    return /^https?:\/\//.test(t.supabase_url || '') && !!t.anon_key && !!t.token &&
           (t.supabase_url.indexOf('__') === -1) && (String(t.token).indexOf('__') === -1);
  }
  return !!t.endpoint && t.endpoint.indexOf('__') === -1;
}
function sendCompletion() {
  const t = CONTENT.tracking || {};
  const total = (CONTENT.quiz || []).length;
  const pct = total ? Math.round((state.score / total) * 100) : 0;
  setTrackingStatus('pending', '⟳ Saving completion record...');
  if (t.provider === 'supabase') {
    // Strawboss-compatible path: call a SECURITY DEFINER RPC. The anon key is public by
    // design; the per-course token scopes what can be written (company + course).
    const url = t.supabase_url.replace(/\/+$/, '') + '/rest/v1/rpc/submit_course_completion';
    fetch(url, {
      method: 'POST',
      headers: { 'apikey': t.anon_key, 'Authorization': 'Bearer ' + t.anon_key, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        p_token: t.token,
        p_worker_name: state.learnerName,
        p_worker_email: state.workerEmail || null,
        p_employer: state.employer,
        p_score: state.score, p_total: total, p_pct: pct, p_passed: state.passed
      })
    }).then(res => {
      if (res.ok) setTrackingStatus('ok', '✓ Completion recorded.');
      else setTrackingStatus('fail', '⚠ Could not save record (' + res.status + '). Screenshot this page for your supervisor.');
    }).catch(() => setTrackingStatus('fail', '⚠ Could not save record. Screenshot this page for your supervisor.'));
  } else {
    // Legacy path: generic endpoint (e.g. Google Apps Script), fire-and-forget.
    const payload = {
      module: t.module_id || ((CONTENT.meta.code || '') + ' ' + (CONTENT.meta.version || '')),
      name: state.learnerName, employer: state.employer,
      score: state.score, total: total, pct: pct,
      passed: state.passed, timestamp: new Date().toISOString()
    };
    fetch(t.endpoint, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload), mode: 'no-cors' })
      .then(() => setTrackingStatus('ok', '✓ Completion record saved.'))
      .catch(() => setTrackingStatus('fail', '⚠ Could not save record. Screenshot this page for your supervisor.'));
  }
}

// Wire up
function refreshStartButton() {
  const name = document.getElementById('learner-name').value.trim();
  const emp = document.getElementById('employer').value.trim();
  document.getElementById('btn-start').disabled = !(name && emp);
}
document.getElementById('learner-name').addEventListener('input', refreshStartButton);
document.getElementById('employer').addEventListener('input', refreshStartButton);
document.getElementById('btn-start').addEventListener('click', () => {
  state.learnerName = document.getElementById('learner-name').value.trim();
  state.employer = document.getElementById('employer').value.trim();
  state.slideIdx = 0;
  showScreen('learn'); renderSlide();
});
document.getElementById('btn-prev').addEventListener('click', () => { if (state.slideIdx > 0) { state.slideIdx--; renderSlide(); } });
document.getElementById('btn-next').addEventListener('click', () => {
  if (state.slideIdx < SLIDES.length - 1) { state.slideIdx++; renderSlide(); }
  else { showScreen('quiz'); renderQuiz(); }
});
document.getElementById('btn-submit-quiz').addEventListener('click', submitQuiz);
document.getElementById('btn-retry').addEventListener('click', () => { state.quizAnswers = {}; state.quizSubmitted = false; state.score = 0; showScreen('quiz'); renderQuiz(); });
document.getElementById('btn-print').addEventListener('click', () => window.print());
document.getElementById('btn-restart').addEventListener('click', () => {
  state = { screen: 'intro', slideIdx: 0, learnerName: '', employer: '', midAnswers: {}, quizAnswers: {}, quizSubmitted: false, score: 0, passed: false };
  document.getElementById('learner-name').value = '';
  document.getElementById('employer').value = '';
  refreshStartButton(); showScreen('intro');
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (state.screen !== 'learn') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); document.getElementById('btn-next').click(); }
  else if (e.key === 'ArrowLeft') { document.getElementById('btn-prev').click(); }
});

renderIntroMeta();
</script>
