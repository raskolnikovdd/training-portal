const SLIDES = [{"kind": "section_intro", "section_idx": 0, "section_title": "Why PPE matters", "title": "Why PPE matters", "eyebrow": "Section 1 \u2014 Why", "icon": "alert", "accent": "amber", "subtitle": "Most people think safe work means wearing PPE. The truth is the opposite.", "audio_text": "Why PPE matters. Most people think safe work means wearing PPE. The truth is the opposite.", "id": "why-ppe-matters-most-people-think-safe-work-means-wearing-pp", "audio": "audio/why-ppe-matters-most-people-think-safe-work-means-wearing-pp.mp3"}, {"kind": "block", "section_idx": 0, "section_title": "Why PPE matters", "eyebrow": "Section 1 \u2014 Why", "accent": "amber", "heading": "The hierarchy of controls", "body": "When you find a hazard, there are five ways to deal with it. PPE is the LAST one \u2014 not the first.", "bullets": ["Eliminate \u2014 remove the hazard entirely (best)", "Substitute \u2014 swap a dangerous thing for a safer one", "Engineer \u2014 build a barrier, ventilation, guard", "Administrative \u2014 procedures, training, signs", "PPE \u2014 protect the worker as a last line of defence"], "audio_text": "The hierarchy of controls When you find a hazard, there are five ways to deal with it. PPE is the LAST one \u2014 not the first. Eliminate \u2014 remove the hazard entirely (best) Substitute \u2014 swap a dangerous thing for a safer one Engineer \u2014 build a barrier, ventilation, guard Administrative \u2014 procedures, training, signs PPE \u2014 protect the worker as a last line of defence", "id": "the-hierarchy-of-controls-when-you-find-a-hazard-there-are-f", "audio": "audio/the-hierarchy-of-controls-when-you-find-a-hazard-there-are-f.mp3"}, {"kind": "block", "section_idx": 0, "section_title": "Why PPE matters", "eyebrow": "Section 1 \u2014 Why", "accent": "amber", "heading": "Why PPE is the last resort", "body": "PPE doesn't fix the hazard \u2014 it just sits between you and harm. If anything goes wrong with the PPE, the harm reaches you.", "bullets": ["PPE can fail (tears, leaks, cracks)", "PPE can be worn wrong (loose strap, gap at the seal)", "PPE can be the wrong type (glove material vs chemical)", "Workers forget, get rushed, or leave it in the truck", "PPE doesn't reduce the hazard for anyone else"], "audio_text": "Why PPE is the last resort PPE doesn't fix the hazard \u2014 it just sits between you and harm. If anything goes wrong with the PPE, the harm reaches you. PPE can fail (tears, leaks, cracks) PPE can be worn wrong (loose strap, gap at the seal) PPE can be the wrong type (glove material vs chemical) Workers forget, get rushed, or leave it in the truck PPE doesn't reduce the hazard for anyone else", "id": "why-ppe-is-the-last-resort-ppe-doesn-t-fix-the-hazard-it-jus", "audio": "audio/why-ppe-is-the-last-resort-ppe-doesn-t-fix-the-hazard-it-jus.mp3"}, {"kind": "block", "section_idx": 0, "section_title": "Why PPE matters", "eyebrow": "Section 1 \u2014 Why", "accent": "amber", "heading": "Why workers still get hurt with PPE on", "body": "Most PPE failures aren't the gear \u2014 they're the choices around it.", "bullets": ["Wrong PPE for the hazard (latex glove vs solvent)", "PPE not worn at the moment it was needed", "PPE worn wrong (strap loose, seal broken, gap at wrist)", "Damaged PPE not noticed and not replaced", "Fit was never checked"], "audio_text": "Why workers still get hurt with PPE on Most PPE failures aren't the gear \u2014 they're the choices around it. Wrong PPE for the hazard (latex glove vs solvent) PPE not worn at the moment it was needed PPE worn wrong (strap loose, seal broken, gap at wrist) Damaged PPE not noticed and not replaced Fit was never checked", "id": "why-workers-still-get-hurt-with-ppe-on-most-ppe-failures-are", "audio": "audio/why-workers-still-get-hurt-with-ppe-on-most-ppe-failures-are.mp3"}, {"kind": "block", "section_idx": 0, "section_title": "Why PPE matters", "eyebrow": "Section 1 \u2014 Why", "accent": "amber", "heading": "Your three rights as a worker", "body": "", "bullets": ["Right to KNOW the hazards and the PPE that protects you", "Right to PARTICIPATE in choosing PPE that fits and works", "Right to REFUSE unsafe work \u2014 including work where the PPE is wrong, missing, or damaged (WCA s. 3.12)"], "audio_text": "Your three rights as a worker Right to KNOW the hazards and the PPE that protects you Right to PARTICIPATE in choosing PPE that fits and works Right to REFUSE unsafe work \u2014 including work where the PPE is wrong, missing, or damaged (WCA s. 3.12)", "id": "your-three-rights-as-a-worker-right-to-know-the-hazards-and-", "audio": "audio/your-three-rights-as-a-worker-right-to-know-the-hazards-and-.mp3"}, {"kind": "section_intro", "section_idx": 1, "section_title": "What the law says", "title": "What the law says", "eyebrow": "Section 2 \u2014 What", "icon": "book", "accent": "blue", "subtitle": "Three parts of the BC OHS Regulation cover PPE. Workers, supervisors, and employers each have their own duties.", "audio_text": "What the law says. Three parts of the BC OHS Regulation cover PPE. Workers, supervisors, and employers each have their own duties.", "id": "what-the-law-says-three-parts-of-the-bc-ohs-regulation-cover", "audio": "audio/what-the-law-says-three-parts-of-the-bc-ohs-regulation-cover.mp3"}, {"kind": "block", "section_idx": 1, "section_title": "What the law says", "eyebrow": "Section 2 \u2014 What", "accent": "blue", "heading": "BC OHS Regulation \u2014 the framework", "body": "", "bullets": ["Part 8 \u2014 Personal Protective Clothing & Equipment (the master section, 44 sub-sections)", "Part 7 \u2014 Noise (covers hearing protection)", "Part 11 \u2014 Fall Protection", "Part 5 \u2014 Chemical Agents (covers PPE selection for chemicals)", "Plus CSA standards referenced in the regs (Z94.1, Z94.3, Z94.4, Z94.2, Z195, Z96, Z259)"], "audio_text": "BC OHS Regulation \u2014 the framework Part 8 \u2014 Personal Protective Clothing & Equipment (the master section, 44 sub-sections) Part 7 \u2014 Noise (covers hearing protection) Part 11 \u2014 Fall Protection Part 5 \u2014 Chemical Agents (covers PPE selection for chemicals) Plus CSA standards referenced in the regs (Z94.1, Z94.3, Z94.4, Z94.2, Z195, Z96, Z259)", "id": "bc-ohs-regulation-the-framework-part-8-personal-protective-c", "audio": "audio/bc-ohs-regulation-the-framework-part-8-personal-protective-c.mp3"}, {"kind": "block", "section_idx": 1, "section_title": "What the law says", "eyebrow": "Section 2 \u2014 What", "accent": "blue", "heading": "What the employer must do", "body": "Employers are responsible for the PPE program.", "bullets": ["Provide the PPE workers need (s. 8.2) at no cost to the worker", "Maintain a written PPE program (s. 8.5)", "Do a workplace hazard assessment to choose the PPE (s. 8.4)", "Train workers on how to use, fit, inspect, and care for it (s. 8.7)", "Review the program at least once a year (s. 8.6)"], "audio_text": "What the employer must do Employers are responsible for the PPE program. Provide the PPE workers need (s. 8.2) at no cost to the worker Maintain a written PPE program (s. 8.5) Do a workplace hazard assessment to choose the PPE (s. 8.4) Train workers on how to use, fit, inspect, and care for it (s. 8.7) Review the program at least once a year (s. 8.6)", "id": "what-the-employer-must-do-employers-are-responsible-for-the-", "audio": "audio/what-the-employer-must-do-employers-are-responsible-for-the-.mp3"}, {"kind": "block", "section_idx": 1, "section_title": "What the law says", "eyebrow": "Section 2 \u2014 What", "accent": "blue", "heading": "What the supervisor must do", "body": "", "bullets": ["Make sure workers have and wear the right PPE (s. 8.8)", "Inspect PPE use during the work day", "Stop the work if PPE is missing, wrong, or damaged", "Address worker concerns about PPE fit or function", "Document training and competency"], "audio_text": "What the supervisor must do Make sure workers have and wear the right PPE (s. 8.8) Inspect PPE use during the work day Stop the work if PPE is missing, wrong, or damaged Address worker concerns about PPE fit or function Document training and competency", "id": "what-the-supervisor-must-do-make-sure-workers-have-and-wear-", "audio": "audio/what-the-supervisor-must-do-make-sure-workers-have-and-wear-.mp3"}, {"kind": "block", "section_idx": 1, "section_title": "What the law says", "eyebrow": "Section 2 \u2014 What", "accent": "blue", "heading": "What workers must do", "body": "", "bullets": ["Use the PPE provided, the way you were trained (s. 8.9)", "Inspect it before every use", "Report problems \u2014 damage, poor fit, wrong type", "Keep PPE in good condition", "Don't take chemical-contaminated PPE home"], "audio_text": "What workers must do Use the PPE provided, the way you were trained (s. 8.9) Inspect it before every use Report problems \u2014 damage, poor fit, wrong type Keep PPE in good condition Don't take chemical-contaminated PPE home", "id": "what-workers-must-do-use-the-ppe-provided-the-way-you-were-t", "audio": "audio/what-workers-must-do-use-the-ppe-provided-the-way-you-were-t.mp3"}, {"kind": "section_intro", "section_idx": 2, "section_title": "Quick check \u2014 Why & What", "title": "Quick check \u2014 Why & What", "eyebrow": "Knowledge check", "icon": "clipboard", "accent": "green", "subtitle": "", "audio_text": "Quick check \u2014 Why & What.", "id": "quick-check-why-what", "audio": "audio/quick-check-why-what.mp3"}, {"kind": "midcheck_q", "section_idx": 2, "section_title": "Quick check \u2014 Why & What", "key": "2-0", "q": {"q": "Where does PPE sit in the hierarchy of controls?", "options": ["First \u2014 it's the most important", "Middle \u2014 it's used together with engineering controls", "Last \u2014 it's the line of defence when other controls can't fully eliminate the hazard"], "correct": 2, "why": "PPE is the LAST line of defence. The order is: eliminate, substitute, engineer, administrative, then PPE. PPE doesn't fix the hazard \u2014 it sits between you and harm."}, "audio_text": "", "id": "slide", "audio": ""}, {"kind": "midcheck_q", "section_idx": 2, "section_title": "Quick check \u2014 Why & What", "key": "2-1", "q": {"q": "Which BC regulation covers most PPE requirements?", "options": ["OHS Regulation Part 5", "OHS Regulation Part 8", "OHS Regulation Part 11", "Workers Compensation Act Part 3"], "correct": 1, "why": "OHS Reg Part 8 \u2014 Personal Protective Clothing & Equipment \u2014 is the master regulation. Part 7 covers noise/hearing, Part 11 covers fall protection, Part 5 covers chemical PPE."}, "audio_text": "", "id": "slide", "audio": ""}, {"kind": "midcheck_q", "section_idx": 2, "section_title": "Quick check \u2014 Why & What", "key": "2-2", "q": {"q": "Who pays for PPE you need to do your job?", "options": ["The worker buys their own", "The employer provides it at no cost (s. 8.2)", "Cost is split 50/50", "WorkSafeBC pays"], "correct": 1, "why": "Section 8.2 makes the employer responsible for providing PPE. Workers should never pay for required PPE."}, "audio_text": "", "id": "slide", "audio": ""}, {"kind": "section_intro", "section_idx": 3, "section_title": "How PPE is chosen", "title": "How PPE is chosen", "eyebrow": "Section 3 \u2014 How", "icon": "wrench", "accent": "purple", "subtitle": "PPE selection isn't guesswork. It starts with a written hazard assessment.", "audio_text": "How PPE is chosen. PPE selection isn't guesswork. It starts with a written hazard assessment.", "id": "how-ppe-is-chosen-ppe-selection-isn-t-guesswork-it-starts-wi", "audio": "audio/how-ppe-is-chosen-ppe-selection-isn-t-guesswork-it-starts-wi.mp3"}, {"kind": "block", "section_idx": 3, "section_title": "How PPE is chosen", "eyebrow": "Section 3 \u2014 How", "accent": "purple", "heading": "Step 1 \u2014 Identify the hazard", "body": "What can hurt you doing this task? Be specific \u2014 \"chemicals\" isn't enough.", "bullets": ["Mechanical \u2014 sharp edges, moving parts, falling objects", "Chemical \u2014 contact, splash, vapour, ingestion", "Thermal \u2014 burns, frostbite", "Biological \u2014 bacteria, viruses, biohazardous materials", "Noise \u2014 over 82 dBA over an 8-hour shift", "Radiation \u2014 UV, ionizing, non-ionizing", "Falls \u2014 work above ground level"], "audio_text": "Step 1 \u2014 Identify the hazard What can hurt you doing this task? Be specific \u2014 \"chemicals\" isn't enough. Mechanical \u2014 sharp edges, moving parts, falling objects Chemical \u2014 contact, splash, vapour, ingestion Thermal \u2014 burns, frostbite Biological \u2014 bacteria, viruses, biohazardous materials Noise \u2014 over 82 dBA over an 8-hour shift Radiation \u2014 UV, ionizing, non-ionizing Falls \u2014 work above ground level", "id": "step-1-identify-the-hazard-what-can-hurt-you-doing-this-task", "audio": "audio/step-1-identify-the-hazard-what-can-hurt-you-doing-this-task.mp3"}, {"kind": "block", "section_idx": 3, "section_title": "How PPE is chosen", "eyebrow": "Section 3 \u2014 How", "accent": "purple", "heading": "Step 2 \u2014 Assess the risk", "body": "How likely is harm? How bad would it be?", "bullets": ["How often is the worker exposed?", "How severe is the worst-case outcome?", "Are existing controls working?", "What's the exposure level (concentration, decibels, height)?"], "audio_text": "Step 2 \u2014 Assess the risk How likely is harm? How bad would it be? How often is the worker exposed? How severe is the worst-case outcome? Are existing controls working? What's the exposure level (concentration, decibels, height)?", "id": "step-2-assess-the-risk-how-likely-is-harm-how-bad-would-it-b", "audio": "audio/step-2-assess-the-risk-how-likely-is-harm-how-bad-would-it-b.mp3"}, {"kind": "block", "section_idx": 3, "section_title": "How PPE is chosen", "eyebrow": "Section 3 \u2014 How", "accent": "purple", "heading": "Step 3 \u2014 Match PPE to the hazard", "body": "Different hazards need different gear. Wrong gear = no protection.", "bullets": ["Chemical splash \u2192 goggles + face shield (not just safety glasses)", "Caustic on skin \u2192 chemical-resistant gloves (not nitrile disposables for hours)", "Solvent vapour \u2192 APR with the right cartridge (not a dust mask)", "85+ dBA noise \u2192 hearing protection rated for the level"], "audio_text": "Step 3 \u2014 Match PPE to the hazard Different hazards need different gear. Wrong gear = no protection. Chemical splash \u2192 goggles + face shield (not just safety glasses) Caustic on skin \u2192 chemical-resistant gloves (not nitrile disposables for hours) Solvent vapour \u2192 APR with the right cartridge (not a dust mask) 85+ dBA noise \u2192 hearing protection rated for the level", "id": "step-3-match-ppe-to-the-hazard-different-hazards-need-differ", "audio": "audio/step-3-match-ppe-to-the-hazard-different-hazards-need-differ.mp3"}, {"kind": "block", "section_idx": 3, "section_title": "How PPE is chosen", "eyebrow": "Section 3 \u2014 How", "accent": "purple", "heading": "Step 4 \u2014 Check compatibility", "body": "Some gear works against other gear. Test the combo before the job.", "bullets": ["Does the glove material resist THIS chemical? (Check the SDS)", "Does your respirator seal break under the face shield?", "Do the safety glasses fit under the welding hood?", "Does the harness clip work with the cold-weather coat?"], "audio_text": "Step 4 \u2014 Check compatibility Some gear works against other gear. Test the combo before the job. Does the glove material resist THIS chemical? (Check the SDS) Does your respirator seal break under the face shield? Do the safety glasses fit under the welding hood? Does the harness clip work with the cold-weather coat?", "id": "step-4-check-compatibility-some-gear-works-against-other-gea", "audio": "audio/step-4-check-compatibility-some-gear-works-against-other-gea.mp3"}, {"kind": "block", "section_idx": 3, "section_title": "How PPE is chosen", "eyebrow": "Section 3 \u2014 How", "accent": "purple", "heading": "Step 5 \u2014 Fit it to the worker", "body": "PPE that doesn't fit doesn't protect.", "bullets": ["Workers come in different sizes \u2014 one size doesn't fit all", "Glasses too loose \u2192 fog up or fall off", "Gloves too big \u2192 snag in machinery", "Respirator that won't seal = no respirator", "Workers should have input \u2014 they wear it all day"], "audio_text": "Step 5 \u2014 Fit it to the worker PPE that doesn't fit doesn't protect. Workers come in different sizes \u2014 one size doesn't fit all Glasses too loose \u2192 fog up or fall off Gloves too big \u2192 snag in machinery Respirator that won't seal = no respirator Workers should have input \u2014 they wear it all day", "id": "step-5-fit-it-to-the-worker-ppe-that-doesn-t-fit-doesn-t-pro", "audio": "audio/step-5-fit-it-to-the-worker-ppe-that-doesn-t-fit-doesn-t-pro.mp3"}, {"kind": "section_intro", "section_idx": 4, "section_title": "Head, eye, face, ear protection", "title": "Head, eye, face, ear protection", "eyebrow": "Section 4 \u2014 Types", "icon": "shield", "accent": "blue", "subtitle": "These four protect the parts of your body most exposed and hardest to repair.", "audio_text": "Head, eye, face, ear protection. These four protect the parts of your body most exposed and hardest to repair.", "id": "head-eye-face-ear-protection-these-four-protect-the-parts-of", "audio": "audio/head-eye-face-ear-protection-these-four-protect-the-parts-of.mp3"}, {"kind": "block", "section_idx": 4, "section_title": "Head, eye, face, ear protection", "eyebrow": "Section 4 \u2014 Types", "accent": "blue", "heading": "Head \u2014 hard hats", "body": "Required where there's a risk of head impact, falling objects, or electric shock from overhead lines.", "bullets": ["Type 1 = top impact only (most construction)", "Type 2 = top + side impact (heavier impacts)", "Class G = general; Class E = electrical 20,000 V; Class C = vented, no electrical protection", "Standard: CSA Z94.1", "Replace after any impact, even if no visible damage", "Replace per manufacturer (often 5 years from manufacture date)"], "audio_text": "Head \u2014 hard hats Required where there's a risk of head impact, falling objects, or electric shock from overhead lines. Type 1 = top impact only (most construction) Type 2 = top + side impact (heavier impacts) Class G = general; Class E = electrical 20,000 V; Class C = vented, no electrical protection Standard: CSA Z94.1 Replace after any impact, even if no visible damage Replace per manufacturer (often 5 years from manufacture date)", "id": "head-hard-hats-required-where-there-s-a-risk-of-head-impact-", "audio": "audio/head-hard-hats-required-where-there-s-a-risk-of-head-impact-.mp3"}, {"kind": "block", "section_idx": 4, "section_title": "Head, eye, face, ear protection", "eyebrow": "Section 4 \u2014 Types", "accent": "blue", "heading": "Eye \u2014 safety glasses & goggles", "body": "Eye injuries are the most common preventable workplace injury. Most workers who got hurt were wearing nothing.", "bullets": ["Safety glasses \u2014 impact protection (small flying particles)", "Chemical goggles \u2014 splash protection (sealed against the face)", "Standard: CSA Z94.3", "Side shields required if there's a side-impact risk (s. 8.16)", "Prescription safety glasses count, with side shields (s. 8.15)", "Contact lenses can be worn but don't replace eye protection (s. 8.18)"], "audio_text": "Eye \u2014 safety glasses & goggles Eye injuries are the most common preventable workplace injury. Most workers who got hurt were wearing nothing. Safety glasses \u2014 impact protection (small flying particles) Chemical goggles \u2014 splash protection (sealed against the face) Standard: CSA Z94.3 Side shields required if there's a side-impact risk (s. 8.16) Prescription safety glasses count, with side shields (s. 8.15) Contact lenses can be worn but don't replace eye protection (s. 8.18)", "id": "eye-safety-glasses-goggles-eye-injuries-are-the-most-common-", "audio": "audio/eye-safety-glasses-goggles-eye-injuries-are-the-most-common-.mp3"}, {"kind": "block", "section_idx": 4, "section_title": "Head, eye, face, ear protection", "eyebrow": "Section 4 \u2014 Types", "accent": "blue", "heading": "Face \u2014 face shields", "body": "Worn OVER eye protection, never instead of it.", "bullets": ["Required for splash hazards, grinding, hot liquids", "Must always be worn with safety glasses or goggles underneath", "Won't seal against vapour \u2014 won't replace a respirator", "Replace if cracked, scratched heavily, or fogged permanently"], "audio_text": "Face \u2014 face shields Worn OVER eye protection, never instead of it. Required for splash hazards, grinding, hot liquids Must always be worn with safety glasses or goggles underneath Won't seal against vapour \u2014 won't replace a respirator Replace if cracked, scratched heavily, or fogged permanently", "id": "face-face-shields-worn-over-eye-protection-never-instead-of-", "audio": "audio/face-face-shields-worn-over-eye-protection-never-instead-of-.mp3"}, {"kind": "block", "section_idx": 4, "section_title": "Head, eye, face, ear protection", "eyebrow": "Section 4 \u2014 Types", "accent": "blue", "heading": "Ears \u2014 hearing protection", "body": "Hearing damage is permanent. You don't grow new hair cells.", "bullets": ["Required when noise exceeds 85 dBA Lex (Part 7, s. 7.4)", "Action level (assessment + warning) at 82 dBA", "Earplugs \u2014 disposable foam, reusable, custom-moulded", "Earmuffs \u2014 over-the-ear, can fit over hard hats", "Standard: CSA Z94.2", "Pumps, compressors, and generators can hit 85+ dBA \u2014 check the noise level on your site"], "audio_text": "Ears \u2014 hearing protection Hearing damage is permanent. You don't grow new hair cells. Required when noise exceeds 85 dBA Lex (Part 7, s. 7.4) Action level (assessment + warning) at 82 dBA Earplugs \u2014 disposable foam, reusable, custom-moulded Earmuffs \u2014 over-the-ear, can fit over hard hats Standard: CSA Z94.2 Pumps, compressors, and generators can hit 85+ dBA \u2014 check the noise level on your site", "id": "ears-hearing-protection-hearing-damage-is-permanent-you-don-", "audio": "audio/ears-hearing-protection-hearing-damage-is-permanent-you-don-.mp3"}, {"kind": "section_intro", "section_idx": 5, "section_title": "Hand, body, foot protection", "title": "Hand, body, foot protection", "eyebrow": "Section 4 \u2014 Types", "icon": "shield", "accent": "blue", "subtitle": "", "audio_text": "Hand, body, foot protection.", "id": "hand-body-foot-protection", "audio": "audio/hand-body-foot-protection.mp3"}, {"kind": "block", "section_idx": 5, "section_title": "Hand, body, foot protection", "eyebrow": "Section 4 \u2014 Types", "accent": "blue", "heading": "Hands \u2014 gloves", "body": "Different gloves protect against different things. The wrong glove gives a false sense of safety.", "bullets": ["Chemical-resistant \u2014 material chosen per chemical (check SDS \u00a7 8)", "Cut-resistant \u2014 rated A1 to A9 per ANSI 105", "Heat / cold \u2014 temperature ranges vary by material", "Impact \u2014 back-of-hand padding for pinch hazards", "Disposable nitrile \u2014 short-term, low-hazard contact only", "Always check fit \u2014 too big snags, too small splits"], "audio_text": "Hands \u2014 gloves Different gloves protect against different things. The wrong glove gives a false sense of safety. Chemical-resistant \u2014 material chosen per chemical (check SDS \u00a7 8) Cut-resistant \u2014 rated A1 to A9 per ANSI 105 Heat / cold \u2014 temperature ranges vary by material Impact \u2014 back-of-hand padding for pinch hazards Disposable nitrile \u2014 short-term, low-hazard contact only Always check fit \u2014 too big snags, too small splits", "id": "hands-gloves-different-gloves-protect-against-different-thin", "audio": "audio/hands-gloves-different-gloves-protect-against-different-thin.mp3"}, {"kind": "block", "section_idx": 5, "section_title": "Hand, body, foot protection", "eyebrow": "Section 4 \u2014 Types", "accent": "blue", "heading": "Body \u2014 coveralls, FR clothing, splash aprons", "body": "Body PPE protects against the hazard that gets past your other gear.", "bullets": ["FR (flame-resistant) clothing \u2014 required around flammable atmospheres or flash-fire risk", "Chemical-resistant suits \u2014 for splash, immersion, vapour", "Splash aprons \u2014 short-duration chemical contact", "Hi-vis vests \u2014 see the hi-vis section", "Coveralls protect skin but only if intact \u2014 replace if torn"], "audio_text": "Body \u2014 coveralls, FR clothing, splash aprons Body PPE protects against the hazard that gets past your other gear. FR (flame-resistant) clothing \u2014 required around flammable atmospheres or flash-fire risk Chemical-resistant suits \u2014 for splash, immersion, vapour Splash aprons \u2014 short-duration chemical contact Hi-vis vests \u2014 see the hi-vis section Coveralls protect skin but only if intact \u2014 replace if torn", "id": "body-coveralls-fr-clothing-splash-aprons-body-ppe-protects-a", "audio": "audio/body-coveralls-fr-clothing-splash-aprons-body-ppe-protects-a.mp3"}, {"kind": "block", "section_idx": 5, "section_title": "Hand, body, foot protection", "eyebrow": "Section 4 \u2014 Types", "accent": "blue", "heading": "Feet \u2014 work boots", "body": "On a worksite, your feet take more abuse than any other body part.", "bullets": ["CSA Z195 grade 1 (green triangle) = full protection", "Steel toe \u2014 impact protection", "Steel midsole (white square) \u2014 puncture protection", "Electrical hazard rating (omega symbol) \u2014 works around live electrical", "Chemical-resistant \u2014 for chemical work", "Slip-resistant tread for wet or oily surfaces (s. 8.23)"], "audio_text": "Feet \u2014 work boots On a worksite, your feet take more abuse than any other body part. CSA Z195 grade 1 (green triangle) = full protection Steel toe \u2014 impact protection Steel midsole (white square) \u2014 puncture protection Electrical hazard rating (omega symbol) \u2014 works around live electrical Chemical-resistant \u2014 for chemical work Slip-resistant tread for wet or oily surfaces (s. 8.23)", "id": "feet-work-boots-on-a-worksite-your-feet-take-more-abuse-than", "audio": "audio/feet-work-boots-on-a-worksite-your-feet-take-more-abuse-than.mp3"}, {"kind": "block", "section_idx": 5, "section_title": "Hand, body, foot protection", "eyebrow": "Section 4 \u2014 Types", "accent": "blue", "heading": "Hi-vis \u2014 see and be seen", "body": "Required where you work around moving vehicles or equipment.", "bullets": ["Standard: CSA Z96", "Class 1 \u2014 low-traffic, low-speed areas", "Class 2 \u2014 most worksites, traffic up to 80 km/h", "Class 3 \u2014 high-speed traffic (highway work)", "Background colour visible in daylight, retroreflective stripes for low light", "Replace when faded \u2014 fluorescent loses brightness over time"], "audio_text": "Hi-vis \u2014 see and be seen Required where you work around moving vehicles or equipment. Standard: CSA Z96 Class 1 \u2014 low-traffic, low-speed areas Class 2 \u2014 most worksites, traffic up to 80 km/h Class 3 \u2014 high-speed traffic (highway work) Background colour visible in daylight, retroreflective stripes for low light Replace when faded \u2014 fluorescent loses brightness over time", "id": "hi-vis-see-and-be-seen-required-where-you-work-around-moving", "audio": "audio/hi-vis-see-and-be-seen-required-where-you-work-around-moving.mp3"}, {"kind": "section_intro", "section_idx": 6, "section_title": "Respiratory protection", "title": "Respiratory protection", "eyebrow": "Section 4 \u2014 Types", "icon": "shield", "accent": "red", "subtitle": "The respirator is the most complex piece of PPE \u2014 and the one workers most often wear wrong.", "audio_text": "Respiratory protection. The respirator is the most complex piece of PPE \u2014 and the one workers most often wear wrong.", "id": "respiratory-protection-the-respirator-is-the-most-complex-pi", "audio": "audio/respiratory-protection-the-respirator-is-the-most-complex-pi.mp3"}, {"kind": "block", "section_idx": 6, "section_title": "Respiratory protection", "eyebrow": "Section 4 \u2014 Types", "accent": "red", "heading": "Two main families", "body": "", "bullets": ["Air-purifying \u2014 filters the air around you (APR, PAPR)", "Atmosphere-supplying \u2014 gives you clean air from a tank or hose (SCBA, SABA)", "APR = useful for known chemicals at known concentrations", "SCBA = needed for unknown atmospheres, IDLH, oxygen-deficient air"], "audio_text": "Two main families Air-purifying \u2014 filters the air around you (APR, PAPR) Atmosphere-supplying \u2014 gives you clean air from a tank or hose (SCBA, SABA) APR = useful for known chemicals at known concentrations SCBA = needed for unknown atmospheres, IDLH, oxygen-deficient air", "id": "two-main-families-air-purifying-filters-the-air-around-you-a", "audio": "audio/two-main-families-air-purifying-filters-the-air-around-you-a.mp3"}, {"kind": "block", "section_idx": 6, "section_title": "Respiratory protection", "eyebrow": "Section 4 \u2014 Types", "accent": "red", "heading": "When you can use APR (air-purifying)", "body": "Only when ALL of these are true:", "bullets": ["Oxygen above 19.5% (s. 8.35)", "Contaminant identified and within the cartridge's protection range", "Concentration below the cartridge's limits", "Not IDLH (Immediately Dangerous to Life or Health)", "If any of these is unknown \u2014 use SCBA"], "audio_text": "When you can use APR (air-purifying) Only when ALL of these are true: Oxygen above 19.5% (s. 8.35) Contaminant identified and within the cartridge's protection range Concentration below the cartridge's limits Not IDLH (Immediately Dangerous to Life or Health) If any of these is unknown \u2014 use SCBA", "id": "when-you-can-use-apr-air-purifying-only-when-all-of-these-ar", "audio": "audio/when-you-can-use-apr-air-purifying-only-when-all-of-these-ar.mp3"}, {"kind": "block", "section_idx": 6, "section_title": "Respiratory protection", "eyebrow": "Section 4 \u2014 Types", "accent": "red", "heading": "Cartridge selection", "body": "Cartridges only stop what they're designed for. Wrong cartridge = no protection.", "bullets": ["Particulate (P100, N95) \u2014 dusts, mists, fumes", "Organic vapour (OV) \u2014 solvents, fuels", "Acid gas (AG) \u2014 acids, chlorine", "Multi-gas combo \u2014 for mixtures", "Check the SDS \u00a7 8 for the right cartridge per chemical", "Replace per manufacturer schedule, sooner if you smell or taste anything"], "audio_text": "Cartridge selection Cartridges only stop what they're designed for. Wrong cartridge = no protection. Particulate (P100, N95) \u2014 dusts, mists, fumes Organic vapour (OV) \u2014 solvents, fuels Acid gas (AG) \u2014 acids, chlorine Multi-gas combo \u2014 for mixtures Check the SDS \u00a7 8 for the right cartridge per chemical Replace per manufacturer schedule, sooner if you smell or taste anything", "id": "cartridge-selection-cartridges-only-stop-what-they-re-design", "audio": "audio/cartridge-selection-cartridges-only-stop-what-they-re-design.mp3"}, {"kind": "block", "section_idx": 6, "section_title": "Respiratory protection", "eyebrow": "Section 4 \u2014 Types", "accent": "red", "heading": "Fit test vs. fit check \u2014 different things", "body": "Both are required. Don't confuse them.", "bullets": ["FIT TEST (s. 8.40) \u2014 formal annual test (qualitative or quantitative). Done once a year, by a trained tester.", "FIT CHECK (s. 8.41) \u2014 every time you put the respirator on. Takes 10 seconds. You do it yourself.", "Positive pressure check \u2014 exhale, feel for leaks at the seal", "Negative pressure check \u2014 inhale, mask should pull in", "If you can't pass a fit check, the respirator isn't sealing \u2014 DO NOT use it"], "audio_text": "Fit test vs. fit check \u2014 different things Both are required. Don't confuse them. FIT TEST (s. 8.40) \u2014 formal annual test (qualitative or quantitative). Done once a year, by a trained tester. FIT CHECK (s. 8.41) \u2014 every time you put the respirator on. Takes 10 seconds. You do it yourself. Positive pressure check \u2014 exhale, feel for leaks at the seal Negative pressure check \u2014 inhale, mask should pull in If you can't pass a fit check, the respirator isn't sealing \u2014 DO NOT use it", "id": "fit-test-vs-fit-check-different-things-both-are-required-don", "audio": "audio/fit-test-vs-fit-check-different-things-both-are-required-don.mp3"}, {"kind": "block", "section_idx": 6, "section_title": "Respiratory protection", "eyebrow": "Section 4 \u2014 Types", "accent": "red", "heading": "Beard rule and seal", "body": "Facial hair under the seal breaks the protection.", "bullets": ["No beard, stubble, or sideburns where the respirator seals", "A close-shave that morning \u2014 not a 24-hour stubble", "PAPR (powered) is an option for workers with beards (positive pressure inside the hood)", "Eyeglass arms can also break the seal \u2014 special inserts available"], "audio_text": "Beard rule and seal Facial hair under the seal breaks the protection. No beard, stubble, or sideburns where the respirator seals A close-shave that morning \u2014 not a 24-hour stubble PAPR (powered) is an option for workers with beards (positive pressure inside the hood) Eyeglass arms can also break the seal \u2014 special inserts available", "id": "beard-rule-and-seal-facial-hair-under-the-seal-breaks-the-pr", "audio": "audio/beard-rule-and-seal-facial-hair-under-the-seal-breaks-the-pr.mp3"}, {"kind": "section_intro", "section_idx": 7, "section_title": "Fall protection", "title": "Fall protection", "eyebrow": "Section 4 \u2014 Types", "icon": "shield", "accent": "red", "subtitle": "Falls are the leading cause of construction fatalities. The rules are strict for a reason.", "audio_text": "Fall protection. Falls are the leading cause of construction fatalities. The rules are strict for a reason.", "id": "fall-protection-falls-are-the-leading-cause-of-construction-", "audio": "audio/fall-protection-falls-are-the-leading-cause-of-construction-.mp3"}, {"kind": "block", "section_idx": 7, "section_title": "Fall protection", "eyebrow": "Section 4 \u2014 Types", "accent": "red", "heading": "When fall protection is required (s. 11.2)", "body": "Workers MUST be protected from falling when:", "bullets": ["Working 3 metres or more above a lower level", "Working any height where a fall could cause injury (think: onto rebar, into a tank, into machinery)", "Above water or other liquid (drowning risk)", "Above a substance that could harm them (acid tank, hot liquid)"], "audio_text": "When fall protection is required (s. 11.2) Workers MUST be protected from falling when: Working 3 metres or more above a lower level Working any height where a fall could cause injury (think: onto rebar, into a tank, into machinery) Above water or other liquid (drowning risk) Above a substance that could harm them (acid tank, hot liquid)", "id": "when-fall-protection-is-required-s-11-2-workers-must-be-prot", "audio": "audio/when-fall-protection-is-required-s-11-2-workers-must-be-prot.mp3"}, {"kind": "block", "section_idx": 7, "section_title": "Fall protection", "eyebrow": "Section 4 \u2014 Types", "accent": "red", "heading": "Hierarchy \u2014 same idea as PPE generally (s. 11.3)", "body": "Try to remove the hazard before you ask the worker to wear gear.", "bullets": ["Eliminate the work at height \u2014 can it be done from the ground?", "Guardrails \u2014 engineering control, no PPE needed", "Travel restraint \u2014 keeps you from reaching the edge", "Fall arrest \u2014 catches you mid-fall (last resort)"], "audio_text": "Hierarchy \u2014 same idea as PPE generally (s. 11.3) Try to remove the hazard before you ask the worker to wear gear. Eliminate the work at height \u2014 can it be done from the ground? Guardrails \u2014 engineering control, no PPE needed Travel restraint \u2014 keeps you from reaching the edge Fall arrest \u2014 catches you mid-fall (last resort)", "id": "hierarchy-same-idea-as-ppe-generally-s-11-3-try-to-remove-th", "audio": "audio/hierarchy-same-idea-as-ppe-generally-s-11-3-try-to-remove-th.mp3"}, {"kind": "block", "section_idx": 7, "section_title": "Fall protection", "eyebrow": "Section 4 \u2014 Types", "accent": "red", "heading": "Fall arrest system components", "body": "If fall arrest is in use, all of these are needed:", "bullets": ["Full-body harness (CSA Z259.10)", "Lanyard or self-retracting lifeline (SRL) (CSA Z259.11)", "Anchorage rated for fall arrest forces (typically 22 kN / 5,000 lbf)", "Connectors (carabiners, snap hooks) \u2014 CSA Z259.12", "Inspection record for every component, every use"], "audio_text": "Fall arrest system components If fall arrest is in use, all of these are needed: Full-body harness (CSA Z259.10) Lanyard or self-retracting lifeline (SRL) (CSA Z259.11) Anchorage rated for fall arrest forces (typically 22 kN / 5,000 lbf) Connectors (carabiners, snap hooks) \u2014 CSA Z259.12 Inspection record for every component, every use", "id": "fall-arrest-system-components-if-fall-arrest-is-in-use-all-o", "audio": "audio/fall-arrest-system-components-if-fall-arrest-is-in-use-all-o.mp3"}, {"kind": "block", "section_idx": 7, "section_title": "Fall protection", "eyebrow": "Section 4 \u2014 Types", "accent": "red", "heading": "Fall clearance \u2014 the math people skip", "body": "If you fall, do you have enough room to stop before hitting the ground?", "bullets": ["Lanyard length + deceleration distance + harness stretch + worker height + safety margin", "Typical clearance needed: 6 metres (~20 feet) below the anchor", "If you don't have that clearance, you need an SRL or different anchor", "On a roof or scaffold under 6 m, fall arrest may not work \u2014 need fall RESTRAINT (no fall at all)"], "audio_text": "Fall clearance \u2014 the math people skip If you fall, do you have enough room to stop before hitting the ground? Lanyard length + deceleration distance + harness stretch + worker height + safety margin Typical clearance needed: 6 metres (~20 feet) below the anchor If you don't have that clearance, you need an SRL or different anchor On a roof or scaffold under 6 m, fall arrest may not work \u2014 need fall RESTRAINT (no fall at all)", "id": "fall-clearance-the-math-people-skip-if-you-fall-do-you-have-", "audio": "audio/fall-clearance-the-math-people-skip-if-you-fall-do-you-have-.mp3"}, {"kind": "block", "section_idx": 7, "section_title": "Fall protection", "eyebrow": "Section 4 \u2014 Types", "accent": "red", "heading": "Plan for the rescue", "body": "A worker hanging in a harness can suffer suspension trauma in 5-10 minutes.", "bullets": ["Every fall protection plan needs a written rescue procedure", "Self-rescue (worker climbs to safety) preferred where possible", "Co-worker rescue with rated equipment", "Calling 911 is NOT a rescue plan", "Emergency response time must be faster than suspension trauma onset"], "audio_text": "Plan for the rescue A worker hanging in a harness can suffer suspension trauma in 5-10 minutes. Every fall protection plan needs a written rescue procedure Self-rescue (worker climbs to safety) preferred where possible Co-worker rescue with rated equipment Calling 911 is NOT a rescue plan Emergency response time must be faster than suspension trauma onset", "id": "plan-for-the-rescue-a-worker-hanging-in-a-harness-can-suffer", "audio": "audio/plan-for-the-rescue-a-worker-hanging-in-a-harness-can-suffer.mp3"}, {"kind": "section_intro", "section_idx": 8, "section_title": "Quick check \u2014 Types & selection", "title": "Quick check \u2014 Types & selection", "eyebrow": "Knowledge check", "icon": "clipboard", "accent": "green", "subtitle": "", "audio_text": "Quick check \u2014 Types & selection.", "id": "quick-check-types-selection", "audio": "audio/quick-check-types-selection.mp3"}, {"kind": "midcheck_q", "section_idx": 8, "section_title": "Quick check \u2014 Types & selection", "key": "8-0", "q": {"q": "When is hearing protection required?", "options": ["Whenever you can hear a pump", "When noise exceeds 85 dBA over an 8-hour shift", "Only when an alarm is going off", "Only when the supervisor reminds you"], "correct": 1, "why": "OHS Reg Part 7, s. 7.4 \u2014 hearing protection is required when noise exceeds 85 dBA Lex over an 8-hour daily exposure. The action level (assessment + warning) starts at 82 dBA."}, "audio_text": "", "id": "slide", "audio": ""}, {"kind": "midcheck_q", "section_idx": 8, "section_title": "Quick check \u2014 Types & selection", "key": "8-1", "q": {"q": "What's the difference between a fit test and a fit check?", "options": ["They're the same thing", "Fit test is annual and formal; fit check is every time you put the respirator on", "Fit check is annual; fit test is daily", "Only the fit test matters"], "correct": 1, "why": "Fit test (s. 8.40) \u2014 done annually by a trained tester. Fit check (s. 8.41) \u2014 done by you every time you put it on. Both are required."}, "audio_text": "", "id": "slide", "audio": ""}, {"kind": "midcheck_q", "section_idx": 8, "section_title": "Quick check \u2014 Types & selection", "key": "8-2", "q": {"q": "At what height does fall protection become legally required?", "options": ["1 metre", "2 metres", "3 metres (or any height if a fall could cause injury)", "5 metres"], "correct": 2, "why": "OHS Reg s. 11.2 \u2014 fall protection is required at 3 m and above, OR at any lesser height if a fall could result in injury (think: falling onto rebar, into machinery, into a tank)."}, "audio_text": "", "id": "slide", "audio": ""}, {"kind": "section_intro", "section_idx": 9, "section_title": "Inspecting PPE", "title": "Inspecting PPE", "eyebrow": "Section 5 \u2014 Inspection", "icon": "clipboard", "accent": "purple", "subtitle": "Before every use. Not once a week. Not when you remember. Every shift, every time.", "audio_text": "Inspecting PPE. Before every use. Not once a week. Not when you remember. Every shift, every time.", "id": "inspecting-ppe-before-every-use-not-once-a-week-not-when-you", "audio": "audio/inspecting-ppe-before-every-use-not-once-a-week-not-when-you.mp3"}, {"kind": "block", "section_idx": 9, "section_title": "Inspecting PPE", "eyebrow": "Section 5 \u2014 Inspection", "accent": "purple", "heading": "Why pre-use inspection matters", "body": "Damaged PPE doesn't protect you. Damage often happens between uses (in the truck, in the locker, in the field).", "bullets": ["PPE that worked yesterday may not work today", "Workers don't always notice damage on their own gear", "A 30-second check catches most problems", "Required by s. 8.3 (selection, use, maintenance) and s. 8.9 (worker responsibilities)"], "audio_text": "Why pre-use inspection matters Damaged PPE doesn't protect you. Damage often happens between uses (in the truck, in the locker, in the field). PPE that worked yesterday may not work today Workers don't always notice damage on their own gear A 30-second check catches most problems Required by s. 8.3 (selection, use, maintenance) and s. 8.9 (worker responsibilities)", "id": "why-pre-use-inspection-matters-damaged-ppe-doesn-t-protect-y", "audio": "audio/why-pre-use-inspection-matters-damaged-ppe-doesn-t-protect-y.mp3"}, {"kind": "block", "section_idx": 9, "section_title": "Inspecting PPE", "eyebrow": "Section 5 \u2014 Inspection", "accent": "purple", "heading": "What to look for \u2014 head, eye, face", "body": "", "bullets": ["Hard hat: cracks, dents, faded shell (UV damage), worn suspension straps", "Safety glasses / goggles: scratches that block vision, broken frames, missing side shields", "Face shield: cracks, deep scratches, broken brackets", "Discard if damaged \u2014 don't try to repair"], "audio_text": "What to look for \u2014 head, eye, face Hard hat: cracks, dents, faded shell (UV damage), worn suspension straps Safety glasses / goggles: scratches that block vision, broken frames, missing side shields Face shield: cracks, deep scratches, broken brackets Discard if damaged \u2014 don't try to repair", "id": "what-to-look-for-head-eye-face-hard-hat-cracks-dents-faded-s", "audio": "audio/what-to-look-for-head-eye-face-hard-hat-cracks-dents-faded-s.mp3"}, {"kind": "block", "section_idx": 9, "section_title": "Inspecting PPE", "eyebrow": "Section 5 \u2014 Inspection", "accent": "purple", "heading": "What to look for \u2014 hands and body", "body": "", "bullets": ["Gloves: holes, tears, stiffness, swelling (chemical degradation), discolouration", "Coveralls / FRC: holes, frays, missing buttons, contamination from previous use", "Splash apron: cracks, peeling coating, broken straps", "Glove leak test for chemical work \u2014 fill with air, twist closed, look/feel for escaping air"], "audio_text": "What to look for \u2014 hands and body Gloves: holes, tears, stiffness, swelling (chemical degradation), discolouration Coveralls / FRC: holes, frays, missing buttons, contamination from previous use Splash apron: cracks, peeling coating, broken straps Glove leak test for chemical work \u2014 fill with air, twist closed, look/feel for escaping air", "id": "what-to-look-for-hands-and-body-gloves-holes-tears-stiffness", "audio": "audio/what-to-look-for-hands-and-body-gloves-holes-tears-stiffness.mp3"}, {"kind": "block", "section_idx": 9, "section_title": "Inspecting PPE", "eyebrow": "Section 5 \u2014 Inspection", "accent": "purple", "heading": "What to look for \u2014 feet, hi-vis, hearing", "body": "", "bullets": ["Boots: worn tread (slip risk), exposed steel (worn-through toe), broken laces, sole separation", "Hi-vis: faded background colour, peeling reflective tape, oil stains that block visibility", "Earplugs: torn, dirty, expired (foam plugs are single-use)", "Earmuffs: cracked cups, hardened seals, broken headband"], "audio_text": "What to look for \u2014 feet, hi-vis, hearing Boots: worn tread (slip risk), exposed steel (worn-through toe), broken laces, sole separation Hi-vis: faded background colour, peeling reflective tape, oil stains that block visibility Earplugs: torn, dirty, expired (foam plugs are single-use) Earmuffs: cracked cups, hardened seals, broken headband", "id": "what-to-look-for-feet-hi-vis-hearing-boots-worn-tread-slip-r", "audio": "audio/what-to-look-for-feet-hi-vis-hearing-boots-worn-tread-slip-r.mp3"}, {"kind": "block", "section_idx": 9, "section_title": "Inspecting PPE", "eyebrow": "Section 5 \u2014 Inspection", "accent": "purple", "heading": "What to look for \u2014 respirators", "body": "Respirator inspection is more involved. Do it right.", "bullets": ["Facepiece: cracks, distortion, hardening (the seal area especially)", "Straps: stretched out, cracked, missing buckles", "Valves: dirty, stuck, missing, torn diaphragms", "Cartridges: expired, wrong type, signs of saturation", "Then: positive and negative pressure fit check before going to work"], "audio_text": "What to look for \u2014 respirators Respirator inspection is more involved. Do it right. Facepiece: cracks, distortion, hardening (the seal area especially) Straps: stretched out, cracked, missing buckles Valves: dirty, stuck, missing, torn diaphragms Cartridges: expired, wrong type, signs of saturation Then: positive and negative pressure fit check before going to work", "id": "what-to-look-for-respirators-respirator-inspection-is-more-i", "audio": "audio/what-to-look-for-respirators-respirator-inspection-is-more-i.mp3"}, {"kind": "block", "section_idx": 9, "section_title": "Inspecting PPE", "eyebrow": "Section 5 \u2014 Inspection", "accent": "purple", "heading": "What to look for \u2014 fall protection", "body": "A failure here is fatal. Inspect carefully.", "bullets": ["Harness webbing: cuts, abrasion, fraying, chemical damage, UV fading, burns", "Stitching: any broken stitches retire the harness", "D-ring and connectors: cracks, deformation, gate function", "Lanyard / SRL: same as harness; SRL must lock when pulled sharply", "Anchor: rated, attached correctly, no signs of stress", "If anything fails inspection \u2014 tag it OUT OF SERVICE and replace"], "audio_text": "What to look for \u2014 fall protection A failure here is fatal. Inspect carefully. Harness webbing: cuts, abrasion, fraying, chemical damage, UV fading, burns Stitching: any broken stitches retire the harness D-ring and connectors: cracks, deformation, gate function Lanyard / SRL: same as harness; SRL must lock when pulled sharply Anchor: rated, attached correctly, no signs of stress If anything fails inspection \u2014 tag it OUT OF SERVICE and replace", "id": "what-to-look-for-fall-protection-a-failure-here-is-fatal-ins", "audio": "audio/what-to-look-for-fall-protection-a-failure-here-is-fatal-ins.mp3"}, {"kind": "block", "section_idx": 9, "section_title": "Inspecting PPE", "eyebrow": "Section 5 \u2014 Inspection", "accent": "purple", "heading": "Tag-out for damaged gear", "body": "Damaged PPE that stays in service WILL get used by someone \u2014 including you on a bad day.", "bullets": ["Mark the gear clearly (damaged + date)", "Remove it from the active equipment area", "Report to your supervisor", "Document \u2014 many companies log PPE failures to find patterns"], "audio_text": "Tag-out for damaged gear Damaged PPE that stays in service WILL get used by someone \u2014 including you on a bad day. Mark the gear clearly (damaged + date) Remove it from the active equipment area Report to your supervisor Document \u2014 many companies log PPE failures to find patterns", "id": "tag-out-for-damaged-gear-damaged-ppe-that-stays-in-service-w", "audio": "audio/tag-out-for-damaged-gear-damaged-ppe-that-stays-in-service-w.mp3"}, {"kind": "section_intro", "section_idx": 10, "section_title": "Cleaning, storage, replacement", "title": "Cleaning, storage, replacement", "eyebrow": "Section 6 \u2014 Maintenance", "icon": "wrench", "accent": "blue", "subtitle": "PPE that's stored badly fails badly. The rules are simple but easy to skip.", "audio_text": "Cleaning, storage, replacement. PPE that's stored badly fails badly. The rules are simple but easy to skip.", "id": "cleaning-storage-replacement-ppe-that-s-stored-badly-fails-b", "audio": "audio/cleaning-storage-replacement-ppe-that-s-stored-badly-fails-b.mp3"}, {"kind": "block", "section_idx": 10, "section_title": "Cleaning, storage, replacement", "eyebrow": "Section 6 \u2014 Maintenance", "accent": "blue", "heading": "Cleaning \u2014 follow the manufacturer", "body": "", "bullets": ["Each piece of PPE has a manufacturer's care guide \u2014 read it", "Don't wash chemical-contaminated PPE at home \u2014 contamination spreads", "Bag heavily contaminated PPE for professional cleaning or disposal", "Don't use solvents on rubber or plastic PPE \u2014 they degrade the material", "Respirators: clean facepiece + valves per the manual after each shift"], "audio_text": "Cleaning \u2014 follow the manufacturer Each piece of PPE has a manufacturer's care guide \u2014 read it Don't wash chemical-contaminated PPE at home \u2014 contamination spreads Bag heavily contaminated PPE for professional cleaning or disposal Don't use solvents on rubber or plastic PPE \u2014 they degrade the material Respirators: clean facepiece + valves per the manual after each shift", "id": "cleaning-follow-the-manufacturer-each-piece-of-ppe-has-a-man", "audio": "audio/cleaning-follow-the-manufacturer-each-piece-of-ppe-has-a-man.mp3"}, {"kind": "block", "section_idx": 10, "section_title": "Cleaning, storage, replacement", "eyebrow": "Section 6 \u2014 Maintenance", "accent": "blue", "heading": "Storage \u2014 protect it from damage", "body": "", "bullets": ["Store PPE clean, dry, away from direct sunlight", "Don't crush or fold \u2014 keep harnesses hung", "Keep PPE away from chemical fumes (a respirator stored above an open solvent isn't clean anymore)", "Separate clean PPE from used PPE", "Truck cabs in summer can hit 60\u00b0C \u2014 bad for rubber, plastic, and adhesives"], "audio_text": "Storage \u2014 protect it from damage Store PPE clean, dry, away from direct sunlight Don't crush or fold \u2014 keep harnesses hung Keep PPE away from chemical fumes (a respirator stored above an open solvent isn't clean anymore) Separate clean PPE from used PPE Truck cabs in summer can hit 60\u00b0C \u2014 bad for rubber, plastic, and adhesives", "id": "storage-protect-it-from-damage-store-ppe-clean-dry-away-from", "audio": "audio/storage-protect-it-from-damage-store-ppe-clean-dry-away-from.mp3"}, {"kind": "block", "section_idx": 10, "section_title": "Cleaning, storage, replacement", "eyebrow": "Section 6 \u2014 Maintenance", "accent": "blue", "heading": "Replacement \u2014 when to retire PPE", "body": "", "bullets": ["Per manufacturer's stated lifespan (often printed on the gear or in the manual)", "After any impact (hard hats), fall (harnesses), or significant chemical contact", "When inspection finds damage that can't be repaired", "When fit changes (lost / gained weight, new prescription)", "When the standard changes (older PPE may no longer comply)"], "audio_text": "Replacement \u2014 when to retire PPE Per manufacturer's stated lifespan (often printed on the gear or in the manual) After any impact (hard hats), fall (harnesses), or significant chemical contact When inspection finds damage that can't be repaired When fit changes (lost / gained weight, new prescription) When the standard changes (older PPE may no longer comply)", "id": "replacement-when-to-retire-ppe-per-manufacturer-s-stated-lif", "audio": "audio/replacement-when-to-retire-ppe-per-manufacturer-s-stated-lif.mp3"}, {"kind": "block", "section_idx": 10, "section_title": "Cleaning, storage, replacement", "eyebrow": "Section 6 \u2014 Maintenance", "accent": "blue", "heading": "Don't take chemical-contaminated PPE home", "body": "Contamination travels. Workers have brought poisons home to their families.", "bullets": ["Change out of contaminated PPE at the end of the shift", "Wash hands and face before eating or smoking", "Wash work clothes separately from family laundry", "Better: use site laundry or disposable coveralls for chemical work", "Required if working with carcinogens / reproductive toxins (Part 6)"], "audio_text": "Don't take chemical-contaminated PPE home Contamination travels. Workers have brought poisons home to their families. Change out of contaminated PPE at the end of the shift Wash hands and face before eating or smoking Wash work clothes separately from family laundry Better: use site laundry or disposable coveralls for chemical work Required if working with carcinogens / reproductive toxins (Part 6)", "id": "don-t-take-chemical-contaminated-ppe-home-contamination-trav", "audio": "audio/don-t-take-chemical-contaminated-ppe-home-contamination-trav.mp3"}, {"kind": "section_intro", "section_idx": 11, "section_title": "Putting it on and taking it off", "title": "Putting it on and taking it off", "eyebrow": "Section 7 \u2014 Use", "icon": "shield", "accent": "purple", "subtitle": "The order matters. Wearing PPE wrong is a common cause of self-contamination.", "audio_text": "Putting it on and taking it off. The order matters. Wearing PPE wrong is a common cause of self-contamination.", "id": "putting-it-on-and-taking-it-off-the-order-matters-wearing-pp", "audio": "audio/putting-it-on-and-taking-it-off-the-order-matters-wearing-pp.mp3"}, {"kind": "block", "section_idx": 11, "section_title": "Putting it on and taking it off", "eyebrow": "Section 7 \u2014 Use", "accent": "purple", "heading": "Donning order \u2014 outer last, inner first", "body": "Put PPE on from the body outward. The outer layers protect the inner layers.", "bullets": ["Boots first (you'll need them grounded before you put on a coverall)", "Coveralls / FRC over boots (so liquid doesn't run inside)", "Apron over coveralls", "Gloves AFTER coverall sleeves (cuff over glove or glove over cuff per task)", "Respirator before goggles + face shield (so the seal isn't broken by frame removal)", "Hard hat last (so it doesn't push your goggles down)"], "audio_text": "Donning order \u2014 outer last, inner first Put PPE on from the body outward. The outer layers protect the inner layers. Boots first (you'll need them grounded before you put on a coverall) Coveralls / FRC over boots (so liquid doesn't run inside) Apron over coveralls Gloves AFTER coverall sleeves (cuff over glove or glove over cuff per task) Respirator before goggles + face shield (so the seal isn't broken by frame removal) Hard hat last (so it doesn't push your goggles down)", "id": "donning-order-outer-last-inner-first-put-ppe-on-from-the-bod", "audio": "audio/donning-order-outer-last-inner-first-put-ppe-on-from-the-bod.mp3"}, {"kind": "block", "section_idx": 11, "section_title": "Putting it on and taking it off", "eyebrow": "Section 7 \u2014 Use", "accent": "purple", "heading": "Doffing order \u2014 outer first, inner last", "body": "The reverse of donning. Treat the outside of every item as contaminated.", "bullets": ["Hard hat first", "Outer gloves", "Apron / outer coverall", "Boots stay on until you can step out clean", "Goggles and face shield", "Respirator LAST \u2014 protects you while everything else is being removed", "Wash hands before eating, drinking, or touching your face"], "audio_text": "Doffing order \u2014 outer first, inner last The reverse of donning. Treat the outside of every item as contaminated. Hard hat first Outer gloves Apron / outer coverall Boots stay on until you can step out clean Goggles and face shield Respirator LAST \u2014 protects you while everything else is being removed Wash hands before eating, drinking, or touching your face", "id": "doffing-order-outer-first-inner-last-the-reverse-of-donning-", "audio": "audio/doffing-order-outer-first-inner-last-the-reverse-of-donning-.mp3"}, {"kind": "block", "section_idx": 11, "section_title": "Putting it on and taking it off", "eyebrow": "Section 7 \u2014 Use", "accent": "purple", "heading": "Glove leak test \u2014 before chemical work", "body": "10 seconds. Catches pinholes you can't see.", "bullets": ["Trap air in the glove by twisting the cuff closed", "Squeeze gently \u2014 feel for any escape of air", "Watch for the glove to lose pressure on its own", "If air escapes \u2014 pinhole somewhere \u2014 replace the glove", "Test BOTH gloves every shift, not just one"], "audio_text": "Glove leak test \u2014 before chemical work 10 seconds. Catches pinholes you can't see. Trap air in the glove by twisting the cuff closed Squeeze gently \u2014 feel for any escape of air Watch for the glove to lose pressure on its own If air escapes \u2014 pinhole somewhere \u2014 replace the glove Test BOTH gloves every shift, not just one", "id": "glove-leak-test-before-chemical-work-10-seconds-catches-pinh", "audio": "audio/glove-leak-test-before-chemical-work-10-seconds-catches-pinh.mp3"}, {"kind": "block", "section_idx": 11, "section_title": "Putting it on and taking it off", "eyebrow": "Section 7 \u2014 Use", "accent": "purple", "heading": "Respirator user seal check", "body": "Two checks, every time you put it on. Takes 10 seconds total.", "bullets": ["POSITIVE pressure: cover the exhalation valve, exhale gently. Mask should puff out slightly. No air escaping at the seal.", "NEGATIVE pressure: cover the cartridge inlets, inhale gently. Mask should collapse slightly inward. No air sneaking in.", "If you fail either check \u2014 adjust the straps, re-seat the mask, try again", "If you still can't pass \u2014 DO NOT enter the contaminated area", "Beard, scar, or PPE pressing on the seal \u2014 all common causes"], "audio_text": "Respirator user seal check Two checks, every time you put it on. Takes 10 seconds total. POSITIVE pressure: cover the exhalation valve, exhale gently. Mask should puff out slightly. No air escaping at the seal. NEGATIVE pressure: cover the cartridge inlets, inhale gently. Mask should collapse slightly inward. No air sneaking in. If you fail either check \u2014 adjust the straps, re-seat the mask, try again If you still can't pass \u2014 DO NOT enter the contaminated area B let state = { screen: 'intro', slideIdx: 0, learnerName: '', employer: '', midAnswers: {}, quizAnswers: {}, quizSubmitted: false, score: 0, passed: false };

function svg(path, color) { return '<svg viewBox="0 0 24 24" fill="none" stroke="' + (color || 'currentColor') + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + path + '</svg>'; }
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  state.screen = name;
  // Pause any playing audio when changing screens
  const aud = document.getElementById('slide-audio');
  if (aud) { aud.pause(); aud.currentTime = 0; }
}

function renderIntroMeta() {
  document.getElementById('brand-eyebrow').textContent = BRAND.tagline || (BRAND.client_name + ' E-LEARNING');

  document.getElementById('intro-subtitle').textContent = CONTENT.meta.subtitle || '';
  document.getElementById('topbar-topic').textContent = CONTENT.meta.topic || 'Training';
  document.getElementById('quiz-topic').textContent = CONTENT.meta.topic || 'Training';
  document.getElementById('r-module').textContent = (CONTENT.meta.code || '') + (CONTENT.meta.version ? ' ' + CONTENT.meta.version : '');
  document.getElementById('result-footer').textContent = CONTENT.meta.regulation_alignment ? 'Aligned with ' + CONTENT.meta.regulation_alignment : '';

  const pills = [
    { icon: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', label: 'Duration', value: CONTENT.meta.duration || '~30 min' },
    { icon: '<circle cx="12" cy="8" r="6"/><path d="M9 14l-2 8 5-3 5 3-2-8"/>', label: 'Pass mark', value: (CONTENT.meta.pass_mark_pct || 70) + '%' },

    { icon: '<path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14"/>', label: 'Audio', value: SLIDES.some(s => s.audio) ? 'Voiceover' : 'Read-only' }
  ];
  document.getElementById('meta-grid').innerHTML = pills.map(p => '<div class="meta-pill"><div class="icon">' + svg(p.icon) + '</div><div><div class="label">' + escapeHtml(p.label) + '</div><div class="value">' + escapeHtml(p.value) + '</div></div></div>').join('');

  document.getElementById('learning-objectives').innerHTML = (CONTENT.meta.what_you_will_learn || []).map(o => '<li>' + escapeHtml(o) + '</li>').join('');
  document.getElementById('footer-tracking-note').textContent = trackingEnabled() ? 'Your completion will be recorded with ' + BRAND.client_short + '.' : 'Print or save your certificate when you finish.';

function renderSlide() {
  const slide = SLIDES[state.slideIdx];
  if (!slide) return;
  const total = SLIDES.length, progress = ((state.slideIdx + 1) / (total + 1)) * 100;

  document.getElementById('slide-counter').textContent = slide.section_title || '';
  document.getElementById('progress-pct').textContent = (state.slideIdx + 1) + ' / ' + total;
  document.getElementById('progress-fill').style.width = progress + '%';

  let html = '';
  const slideKind = slide.kind;
  if (slideKind === 'section_intro') html = renderSectionIntro(slide);
  else if (slideKind === 'block') html = renderBlockSlide(slide);
  else if (slideKind === 'video') html = renderVideoSlide(slide);
  else if (slideKind === 'pictograms') html = renderPictogramsSlide(slide);
  else if (slideKind === 'chemcard') html = renderChemCardSlide(slide);
  else if (slideKind === 'scenario') html = renderScenarioSlide(slide);
  else if (slideKind === 'midcheck_q') html = renderMidCheckQSlide(slide);

  document.getElementById('slide-body').innerHTML = html;
  attachMidCheckHandlers();

  // Audio
  const audioEl = document.getElementById('slide-audio');
  const audioContainer = document.getElementById('audio-container');
  if (slide.audio) {
    audioEl.src = slide.audio;
    audioContainer.classList.remove('empty');
  } else {
    audioEl.removeAttribute('src');
    audioContainer.classList.add('empty');
  }

  // Nav
  document.getElementById('btn-prev').disabled = state.slideIdx === 0;
  const isLast = state.slideIdx === total - 1;
  document.getElementById('btn-next').innerHTML = (isLast ? 'Final quiz' : 'Continue') + ' <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

  // Scroll the slide content area to top
  const sc = document.querySelector('#screen-learn .slide-content');
  if (sc) sc.scrollTop = 0;
}

function renderSectionIntro(slide) {
  const ac = ACCENTS[slide.accent] || ACCENTS.blue;
  return '<div class="section-intro"><div class="icon-big" style="background:' + ac + '">' + svg(ICONS[slide.icon] || ICONS.book, '#fff') + '</div>' +

    '<h2>' + escapeHtml(slide.title) + '</h2>' +
    (slide.subtitle ? '<p class="subtitle">' + escapeHtml(slide.subtitle) + '</p>' : '') + '</div>';
}

function renderPictogramsSlide(slide) {

function renderChemCardSlide(slide) {
  const c = slide.card;
  const sigColor = c.signal === 'DANGER' ? ACCENTS.red : ACCENTS.amber;
  const rowColors = { 'EXPOSURE LIMITS': ACCENTS.amber, 'PPE': ACCENTS.blue, 'FIRST AID': ACCENTS.green, 'SPILL': ACCENTS.purple, 'STORAGE': ACCENTS.darkblue };
  return '<div class="chem-card"><div class="chem-card-header"><div class="chem-pictos-row">' +
    (c.pictogram_data || []).map(p => '<img src="' + p + '" alt="">').join('') +
    '<span class="signal-badge" style="background:' + sigColor + '">' + escapeHtml(c.signal || '') + '</span></div>' +
    '<div class="chem-card-name">' + escapeHtml(c.name) + '</div><div class="chem-card-full">' + escapeHtml(c.full_name || '') + (c.supplier ? ' · ' + escapeHtml(c.supplier) : '') + '</div>' +
    '<div class="chem-haz">' + escapeHtml(c.hazard_summary || '') + '</div></div>' +
    (c.rows || []).map(row => {
      const rc = rowColors[row.label] || ACCENTS.blue;
      return '<div class="chem-row"><div class="chem-row-label" style="background:' + rc + '">' + escapeHtml(row.label) + '</div><div class="chem-row-items"><ul>' +
        row.items.map(it => '<li><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:' + rc + ';margin-top:7px;margin-right:6px;flex-shrink:0;"></span>' + escapeHtml(it) + '</li>').join('') + '</ul></div></div>';
    }).join('') + '</div>';
}

function renderMidCheckQSlide(slide) {
  const q = slide.q, key = slide.key;
  const ans = state.midAnswers[key], answered = ans !== undefined;
  return '<div class="kc-banner"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p><strong>Quick check.</strong> You\'ll see the answer right away — won\'t count against your final quiz.</p></div>' +
    '<div class="q-card"><div class="q-text">' + escapeHtml(q.q) + '</div><div class="q-options">' +
    q.options.map((opt, oi) => {
      let cls = 'q-option';
      if (answered) { if (oi === q.correct) cls += ' correct'; else if (ans === oi) cls += ' incorrect'; }
      const checkSvg = answered && oi === q.correct ? '<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>' : '';
      return '<button class="' + cls + '" data-mid="' + key + '" data-opt="' + oi + '" ' + (answered ? 'disabled' : '') + '><span>' + escapeHtml(opt) + '</span>' + checkSvg + '</button>';
    }).join('') + '</div>' +
    (answered ? '<div class="feedback ' + (ans === q.correct ? 'right' : 'wrong') + '"><strong>' + (ans === q.correct ? '✓ Correct.' : '✗ Not quite.') + '</strong> ' + escapeHtml(q.why) + '</div>' : '') + '</div>';
}

function attachMidCheckHandlers() {
  document.querySelectorAll('[data-mid]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.mid, opt = parseInt(btn.dataset.opt);
      if (state.midAnswers[key] !== undefined) return;
      state.midAnswers[key] = opt;
      renderSlide();
    });
  });
}

function renderQuiz() {
  const quiz = CONTENT.quiz || [];
  const passN = Math.ceil(quiz.length * (CONTENT.meta.pass_mark_pct || 70) / 100);
  document.getElementById('quiz-instructions').textContent = quiz.length + ' questions. ' + (CONTENT.meta.pass_mark_pct || 70) + '% to pass (' + passN + '/' + quiz.length + ').';
  document.getElementById('quiz-questions').innerHTML = quiz.map((q, i) => {
    return '<div class="quiz-q"><div><span style="font-size:11px;font-weight:700;color:var(--brand-primary);">Q' + (i + 1) + '.</span> <span style="font-weight:600;">' + escapeHtml(q.q) + '</span></div><div class="q-options" style="margin-top:14px;">' +
      q.options.map((opt, j) => {
        let cls = 'q-option';
        if (state.quizSubmitted) { if (j === q.correct) cls += ' correct'; else if (state.quizAnswers[i] === j) cls += ' incorrect'; }
        else if (state.quizAnswers[i] === j) cls += ' selected';
        return '<button class="' + cls + '" data-q="' + i + '" data-opt="' + j + '" ' + (state.quizSubmitted ? 'disabled' : '') + '><span class="letter">' + String.fromCharCode(65 + j) + '.</span><span style="flex:1;">' + escapeHtml(opt) + '</span></button>';
      }).join('') + '</div>' +
      (state.quizSubmitted && q.why ? '<div class="feedback ' + (state.quizAnswers[i] === q.correct ? 'right' : 'wrong') + '" style="margin-top:12px;"><strong>' + (state.quizAnswers[i] === q.correct ? '✓ Correct.' : '✗ Not quite.') + '</strong> ' + escapeHtml(q.why) + '</div>' : '') + '</div>';
  }).join('');
  document.querySelectorAll('#quiz-questions [data-q]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.quizSubmitted) return;
      state.quizAnswers[parseInt(btn.dataset.q)] = parseInt(btn.dataset.opt);
      renderQuiz();
      checkQuizComplete();
    });
  });
  checkQuizComplete();
}

function checkQuizComplete() {
  const all = (CONTENT.quiz || []).every((_, i) => state.quizAnswers[i] !== undefined);
  document.getElementById('btn-submit-quiz').disabled = !all;
}

function submitQuiz() {
  const quiz = CONTENT.quiz || [];
  const passN = Math.ceil(quiz.length * (CONTENT.meta.pass_mark_pct || 70) / 100);
  let s = 0;
  quiz.forEach((q, i) => { if (state.quizAnswers[i] === q.correct) s++; });
  state.score = s; state.passed = s >= passN; state.quizSubmitted = true;
  renderResult(); showScreen('result');
  if (trackingEnabled()) sendCompletion();
}

function renderResult() {
  const passed = state.passed, quiz = CONTENT.quiz || [];
  const passN = Math.ceil(quiz.length * (CONTENT.meta.pass_mark_pct || 70) / 100);
  const pct = Math.round((state.score / quiz.length) * 100);
  document.querySelector('#screen-result .result-bg').className = 'result-bg ' + (passed ? 'passed' : 'failed');
  document.getElementById('result-icon').className = 'result-icon ' + (passed ? 'pass' : 'fail');
  document.getElementById('result-icon').innerHTML = passed ? svg(ICONS.award) : svg('<path d="M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 005.64 5.64L1 10M3.51 15A9 9 0 0018.36 18.36L23 14"/>');
  document.getElementById('result-title').textContent = passed ? 'Module complete' : 'Not quite there';
  document.getElementById('result-subtitle').textContent = passed ? 'You have successfully completed this training module.' : 'You need ' + passN + ' out of ' + quiz.length + ' correct to pass. Review and try again.';
  document.getElementById('r-name').textContent = state.learnerName;
  document.getElementById('r-employer').textContent = state.employer;
  document.getElementById('r-score').textContent = state.score + ' / ' + quiz.length + ' (' + pct + '%)';
  const rResult = document.getElementById('r-result');
  rResult.textContent = passed ? 'PASSED' : 'FAILED';
  rResult.style.color = passed ? ACCENTS.green : ACCENTS.amber;
  document.getElementById('r-date').textContent = new Date().toLocaleString('en-CA');
  document.getElementById('btn-retry').style.display = passed ? 'none' : 'inline-flex';
}

function setTrackingStatus(status, msg) {
  const el = document.getElementById('tracking-status');
  el.className = 'tracking-status ' + status; el.textContent = msg;
}
// Tracking is "enabled" only when real config is present — placeholders (containing "__")
// leave it disabled so the module still works and just shows the print-certificate note.
function trackingEnabled() {
  const t = CONTENT.tracking || {};
  if (t.provider === 'supabase') {
    return /^https?:\/\//.test(t.supabase_url || '') && !!t.anon_key && !!t.token &&
           (t.supabase_url.indexOf('__') === -1) && (String(t.token).indexOf('__') === -1);
  }
  return !!t.endpoint && t.endpoint.indexOf('__') === -1;
}
function sendCompletion() {
  const t = CONTENT.tracking || {};
  const total = (CONTENT.quiz || []).length;
  const pct = total ? Math.round((state.score / total) * 100) : 0;
  setTrackingStatus('pending', '⟳ Saving completion record...');
  if (t.provider === 'supabase') {
    // Strawboss-compatible path: call a SECURITY DEFINER RPC. The anon key is public by
    // design; the per-course token scopes what can be written (company + course).
    const url = t.supabase_url.replace(/\/+$/, '') + '/rest/v1/rpc/submit_course_completion';
    fetch(url, {
      method: 'POST',
      headers: { 'apikey': t.anon_key, 'Authorization': 'Bearer ' + t.anon_key, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        p_token: t.token,
        p_worker_name: state.learnerName,
        p_worker_email: state.workerEmail || null,
        p_employer: state.employer,
        p_score: state.score, p_total: total, p_pct: pct, p_passed: state.passed
      })
    }).then(res => {
      if (res.ok) setTrackingStatus('ok', '✓ Completion recorded.');
      else setTrackingStatus('fail', '⚠ Could not save record (' + res.status + '). Screenshot this page for your supervisor.');
    }).catch(() => setTrackingStatus('fail', '⚠ Could not save record. Screenshot this page for your supervisor.'));
  } else {
    // Legacy path: generic endpoint (e.g. Google Apps Script), fire-and-forget.
    const payload = {
      module: t.module_id || ((CONTENT.meta.code || '') + ' ' + (CONTENT.meta.version || '')),
      name: state.learnerName, employer: state.employer,
      score: state.score, total: total, pct: pct,
      passed: state.passed, timestamp: new Date().toISOString()
    };
    fetch(t.endpoint, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload), mode: 'no-cors' })
      .then(() => setTrackingStatus('ok', '✓ Completion record saved.'))
      .catch(() => setTrackingStatus('fail', '⚠ Could not save record. Screenshot this page for your supervisor.'));
  }
}

// Wire up
function refreshStartButton() {
  const name = document.getElementById('learner-name').value.trim();
  const emp = document.getElementById('employer').value.trim();
  document.getElementById('btn-start').disabled = !(name && emp);
}
document.getElementById('learner-name').addEventListener('input', refreshStartButton);
document.getElementById('employer').addEventListener('input', refreshStartButton);
document.getElementById('btn-start').addEventListener('click', () => {
  state.learnerName = document.getElementById('learner-name').value.trim();
  state.employer = document.getElementById('employer').value.trim();
  state.slideIdx = 0;
  showScreen('learn'); renderSlide();
});
document.getElementById('btn-prev').addEventListener('click', () => { if (state.slideIdx > 0) { state.slideIdx--; renderSlide(); } });
document.getElementById('btn-next').addEventListener('click', () => {
  if (state.slideIdx < SLIDES.length - 1) { state.slideIdx++; renderSlide(); }
  else { showScreen('quiz'); renderQuiz(); }
});
document.getElementById('btn-submit-quiz').addEventListener('click', submitQuiz);
document.getElementById('btn-retry').addEventListener('click', () => { state.quizAnswers = {}; state.quizSubmitted = false; state.score = 0; showScreen('quiz'); renderQuiz(); });
document.getElementById('btn-print').addEventListener('click', () => window.print());
document.getElementById('btn-restart').addEventListener('click', () => {
  state = { screen: 'intro', slideIdx: 0, learnerName: '', employer: '', midAnswers: {}, quizAnswers: {}, quizSubmitted: false, score: 0, passed: false };
  document.getElementById('learner-name').value = '';
  document.getElementById('employer').value = '';
  refreshStartButton(); showScreen('intro');
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (state.screen !== 'learn') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); document.getElementById('btn-next').click(); }
  else if (e.key === 'ArrowLeft') { document.getElementById('btn-prev').click(); }
});

renderIntroMeta();
</script>
